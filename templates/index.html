<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aivy AI Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
    }

    .glass {
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.05);
    }

    .fade-in {
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .typing-dots span {
      animation: blink 1.4s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }
  </style>
</head>

<body class="flex justify-center items-center h-screen text-white">

<div class="w-full max-w-3xl h-[700px] glass rounded-3xl shadow-2xl flex flex-col border border-gray-700">

  <!-- Header -->
  <div class="flex items-center gap-3 p-5 border-b border-gray-700">
    <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center font-bold">
      AI
    </div>
    <div>
      <h2 class="font-semibold text-lg">Aivy AI Assistant</h2>
      <p class="text-sm text-gray-400">Online • Ready to help</p>
    </div>
  </div>

  <!-- Chat -->
  <div id="chatBox" class="flex-1 p-5 overflow-y-auto space-y-4"></div>

  <!-- Input -->
  <div class="p-4 border-t border-gray-700 flex items-center gap-3">
    <input 
      id="userInput"
      type="text"
      placeholder="Ask anything..."
      class="flex-1 p-3 rounded-xl bg-gray-800 text-white outline-none focus:ring-2 focus:ring-blue-500"
      onkeypress="handleKey(event)"
    />

    <button onclick="sendMessage()" 
      class="bg-blue-500 hover:bg-blue-600 px-5 py-2 rounded-xl transition">
      ➤
    </button>
  </div>

</div>

<script>

function addMessage(message, isUser) {
  const chatBox = document.getElementById("chatBox");

  const wrapper = document.createElement("div");
  wrapper.className = `flex ${isUser ? "justify-end" : "justify-start"} fade-in`;

  const bubble = `
    <div class="flex items-end gap-2 max-w-[75%]">
      ${!isUser ? '<div class="w-8 h-8 bg-gray-600 rounded-full flex items-center justify-center text-sm">🤖</div>' : ''}
      
      <div class="${isUser ? 'bg-blue-500' : 'bg-gray-700'} px-4 py-2 rounded-2xl shadow-md">
        ${message}
      </div>

      ${isUser ? '<div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-sm">👤</div>' : ''}
    </div>
  `;

  wrapper.innerHTML = bubble;
  chatBox.appendChild(wrapper);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping() {
  const chatBox = document.getElementById("chatBox");

  const div = document.createElement("div");
  div.id = "typing";
  div.className = "flex justify-start fade-in";

  div.innerHTML = `
    <div class="flex items-center gap-2 bg-gray-700 px-4 py-2 rounded-2xl">
      <div class="typing-dots">
        <span>.</span><span>.</span><span>.</span>
      </div>
    </div>
  `;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
  const typing = document.getElementById("typing");
  if (typing) typing.remove();
}

async function sendMessage() {
  const input = document.getElementById("userInput");
  const message = input.value.trim();

  if (!message) return;

  addMessage(message, true);
  input.value = "";

  showTyping();

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    removeTyping();
    addMessage(data.reply, false);

  } catch (error) {
    removeTyping();
    addMessage("⚠️ Server error", false);
  }
}

function handleKey(e) {
  if (e.key === "Enter") sendMessage();
}

</script>

</body>
</html>
